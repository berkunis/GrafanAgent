name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (ruff + pytest + eval rule)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Golden-set eval (rule mode)
        # Deterministic gate — runs without ANTHROPIC_API_KEY. The LLM-judge
        # path runs nightly on main; see eval-nightly.yml.
        run: grafanagent eval --mode rule --threshold 0.85

  typescript:
    name: typescript (slack-approver)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/slack-approver
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/slack-approver/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Vitest
        run: npm test
