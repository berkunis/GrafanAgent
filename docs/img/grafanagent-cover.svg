<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="820" x2="1920" y2="820"/>
  </g>

  <!-- Title -->
  <text x="100" y="135" fill="#F8FAFC" font-size="88" font-weight="800" letter-spacing="-2">
    GrafanAgent
  </text>
  <text x="100" y="185" fill="#94A3B8" font-size="28" font-weight="400" letter-spacing="0.5">
    Multi-agent marketing-ops copilot — observed end-to-end with the Grafana LGTM stack
  </text>

  <!-- Pipeline heading -->
  <text x="100" y="260" fill="#F97316" font-size="18" font-weight="700" letter-spacing="3">
    PIPELINE
  </text>

  <!-- Pipeline stages -->
  <g>
    <!-- Signal -->
    <rect x="100" y="290" width="270" height="110" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <text x="235" y="335" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Signal</text>
    <text x="235" y="365" text-anchor="middle" fill="#94A3B8" font-size="16">BigQuery · Pub/Sub</text>
    <text x="235" y="385" text-anchor="middle" fill="#94A3B8" font-size="16">webhook · CLI</text>

    <!-- Arrow 1 -->
    <g stroke="#F97316" stroke-width="2" fill="none">
      <line x1="378" y1="345" x2="432" y2="345"/>
      <polygon points="432,339 448,345 432,351" fill="#F97316" stroke="none"/>
    </g>

    <!-- Router -->
    <rect x="456" y="290" width="300" height="110" rx="14" fill="#1E293B" stroke="url(#accentOrange)" stroke-width="2"/>
    <text x="606" y="330" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Router (Haiku)</text>
    <text x="606" y="360" text-anchor="middle" fill="#FB923C" font-size="15">Haiku → Sonnet</text>
    <text x="606" y="380" text-anchor="middle" fill="#FB923C" font-size="15">→ rule → HITL</text>

    <!-- Arrow 2 -->
    <g stroke="#F97316" stroke-width="2" fill="none">
      <line x1="764" y1="345" x2="818" y2="345"/>
      <polygon points="818,339 834,345 818,351" fill="#F97316" stroke="none"/>
    </g>

    <!-- Skill agents -->
    <rect x="842" y="290" width="340" height="110" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <text x="1012" y="325" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Skill agents (Sonnet)</text>
    <text x="1012" y="355" text-anchor="middle" fill="#94A3B8" font-size="15">Lifecycle · Lead-Scoring</text>
    <text x="1012" y="377" text-anchor="middle" fill="#94A3B8" font-size="15">Attribution — parallel fan-out</text>

    <!-- Arrow 3 -->
    <g stroke="#F97316" stroke-width="2" fill="none">
      <line x1="1190" y1="345" x2="1244" y2="345"/>
      <polygon points="1244,339 1260,345 1244,351" fill="#F97316" stroke="none"/>
    </g>

    <!-- HITL -->
    <rect x="1268" y="290" width="270" height="110" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <text x="1403" y="325" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">HITL (Slack)</text>
    <text x="1403" y="355" text-anchor="middle" fill="#94A3B8" font-size="15">TypeScript Bolt</text>
    <text x="1403" y="377" text-anchor="middle" fill="#94A3B8" font-size="15">Block Kit state machine</text>

    <!-- Arrow 4 -->
    <g stroke="#F97316" stroke-width="2" fill="none">
      <line x1="1546" y1="345" x2="1600" y2="345"/>
      <polygon points="1600,339 1616,345 1600,351" fill="#F97316" stroke="none"/>
    </g>

    <!-- Action -->
    <rect x="1624" y="290" width="196" height="110" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <text x="1722" y="335" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Action</text>
    <text x="1722" y="365" text-anchor="middle" fill="#94A3B8" font-size="15">Customer.io</text>
    <text x="1722" y="385" text-anchor="middle" fill="#94A3B8" font-size="15">idempotent</text>
  </g>

  <!-- Bridge down to observability -->
  <g stroke="#22D3EE" stroke-width="2" stroke-dasharray="6 6" opacity="0.8" fill="none">
    <line x1="960" y1="420" x2="960" y2="510"/>
  </g>
  <text x="1000" y="475" fill="#22D3EE" font-size="16" font-weight="600" letter-spacing="0.5">
    OTel genai semantic conventions on every span
  </text>

  <!-- Observability heading -->
  <text x="100" y="560" fill="#22D3EE" font-size="18" font-weight="700" letter-spacing="3">
    OBSERVABILITY · GRAFANA LGTM STACK
  </text>

  <!-- Observability stack -->
  <g>
    <!-- Tempo -->
    <rect x="100" y="590" width="420" height="170" rx="16" fill="#0F1E2B" stroke="url(#accentCyan)" stroke-width="1.5"/>
    <text x="130" y="632" fill="#22D3EE" font-size="24" font-weight="800">Tempo</text>
    <text x="130" y="665" fill="#CBD5E1" font-size="17">traces — click any span to see</text>
    <text x="130" y="690" fill="#CBD5E1" font-size="17">prompt + completion + $ cost</text>
    <text x="130" y="735" fill="#64748B" font-size="14">gen_ai.prompt · gen_ai.completion · gen_ai.usage.*</text>

    <!-- Loki -->
    <rect x="540" y="590" width="420" height="170" rx="16" fill="#0F1E2B" stroke="url(#accentCyan)" stroke-width="1.5"/>
    <text x="570" y="632" fill="#22D3EE" font-size="24" font-weight="800">Loki</text>
    <text x="570" y="665" fill="#CBD5E1" font-size="17">structured JSON logs,</text>
    <text x="570" y="690" fill="#CBD5E1" font-size="17">PII-scrubbed, HITL audit trail</text>
    <text x="570" y="735" fill="#64748B" font-size="14">structlog pipeline · 11 patterns redacted</text>

    <!-- Mimir -->
    <rect x="980" y="590" width="420" height="170" rx="16" fill="#0F1E2B" stroke="url(#accentCyan)" stroke-width="1.5"/>
    <text x="1010" y="632" fill="#22D3EE" font-size="24" font-weight="800">Mimir</text>
    <text x="1010" y="665" fill="#CBD5E1" font-size="17">metrics — cost, tokens,</text>
    <text x="1010" y="690" fill="#CBD5E1" font-size="17">latency histogram, eval scores</text>
    <text x="1010" y="735" fill="#64748B" font-size="14">grafanagent_llm_* · grafanagent_signal_cost_usd_total</text>

    <!-- Grafana -->
    <rect x="1420" y="590" width="400" height="170" rx="16" fill="#0F1E2B" stroke="url(#accentOrange)" stroke-width="1.5"/>
    <text x="1450" y="632" fill="#F97316" font-size="24" font-weight="800">Grafana</text>
    <text x="1450" y="665" fill="#CBD5E1" font-size="17">dashboards + 6 alert rules</text>
    <text x="1450" y="690" fill="#CBD5E1" font-size="17">cost · latency · eval regression</text>
    <text x="1450" y="735" fill="#64748B" font-size="14">$ per signal · top-10 expensive · p95 by agent</text>
  </g>

  <!-- Tech chips -->
  <g font-size="15" font-weight="600">
    <rect x="100" y="870" width="120" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="160" y="894" text-anchor="middle" fill="#F8FAFC">Python 3.12</text>

    <rect x="232" y="870" width="100" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="282" y="894" text-anchor="middle" fill="#F8FAFC">Node 22</text>

    <rect x="344" y="870" width="140" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="414" y="894" text-anchor="middle" fill="#F8FAFC">Anthropic SDK</text>

    <rect x="496" y="870" width="90" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="541" y="894" text-anchor="middle" fill="#F8FAFC">MCP</text>

    <rect x="598" y="870" width="170" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="683" y="894" text-anchor="middle" fill="#F8FAFC">GCP · Cloud Run</text>

    <rect x="780" y="870" width="130" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="845" y="894" text-anchor="middle" fill="#F8FAFC">Vertex AI</text>

    <rect x="922" y="870" width="110" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="977" y="894" text-anchor="middle" fill="#F8FAFC">pgvector</text>

    <rect x="1044" y="870" width="180" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="1134" y="894" text-anchor="middle" fill="#F8FAFC">Terraform · Pub/Sub</text>

    <rect x="1236" y="870" width="130" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="1301" y="894" text-anchor="middle" fill="#F8FAFC">Slack Bolt</text>

    <rect x="1378" y="870" width="120" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="1438" y="894" text-anchor="middle" fill="#F8FAFC">OpenTelemetry</text>

    <rect x="1510" y="870" width="170" height="38" rx="19" fill="#1E293B" stroke="#334155"/>
    <text x="1595" y="894" text-anchor="middle" fill="#F8FAFC">GitHub Actions CI</text>
  </g>

  <!-- Stats footer -->
  <g font-size="20" font-weight="700">
    <text x="100" y="985" fill="#F8FAFC">
      <tspan fill="#F97316" font-weight="800">4</tspan><tspan fill="#94A3B8"> agents</tspan>
      <tspan fill="#475569">   ·   </tspan>
      <tspan fill="#F97316" font-weight="800">3</tspan><tspan fill="#94A3B8"> MCP servers</tspan>
      <tspan fill="#475569">   ·   </tspan>
      <tspan fill="#F97316" font-weight="800">12</tspan><tspan fill="#94A3B8"> RAG playbooks</tspan>
      <tspan fill="#475569">   ·   </tspan>
      <tspan fill="#22D3EE" font-weight="800">171</tspan><tspan fill="#94A3B8"> tests green</tspan>
      <tspan fill="#475569">   ·   </tspan>
      <tspan fill="#22D3EE" font-weight="800">13</tspan><tspan fill="#94A3B8"> panels</tspan>
      <tspan fill="#475569">   ·   </tspan>
      <tspan fill="#22D3EE" font-weight="800">6</tspan><tspan fill="#94A3B8"> alert rules</tspan>
    </text>
  </g>

  <!-- Footer line -->
  <text x="100" y="1030" fill="#64748B" font-size="16">
    github.com/berkunis/GrafanAgent · MIT · built with Claude Code · every commit co-authored + human-reviewed
  </text>
</svg>
