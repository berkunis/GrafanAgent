# Local dev dependencies. Runs one thing today (pgvector); later phases add
# more. `make db-up` is the friendly entrypoint.
services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: grafanagent-pgvector
    environment:
      POSTGRES_USER: grafanagent
      POSTGRES_PASSWORD: grafanagent
      POSTGRES_DB: grafanagent
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - grafanagent_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafanagent -d grafanagent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  grafanagent_pgvector_data: {}
